{{- /* ================================================
     Custom head additions: Google Fonts
     Inter (body) + JetBrains Mono (code)
     ================================================ */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
{{- /* Skip-to-content link injected before <header> for keyboard accessibility */ -}}
<script>
document.addEventListener("DOMContentLoaded", function () {
    var skip = document.createElement("a");
    skip.href = "#main-content";
    skip.className = "skip-nav";
    skip.textContent = "Skip to content";
    document.body.prepend(skip);
    var main = document.querySelector("main.main");
    if (main) { main.id = "main-content"; }
});
</script>
